<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Civ: Empires</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-bg: rgba(22, 33, 62, 0.85);
            --accent: #e94560;
            --text: #ffffff;
            --gold: #ffd700;
            --food: #4caf50;
            --science: #2196f3;
            --culture: #9c27b0;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            user-select: none;
        }

        #gameCanvas {
            display: block;
            cursor: crosshair;
        }

        /* UI Overlay */
        .ui-layer {
            position: absolute;
            pointer-events: none;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .pointer-events-auto {
            pointer-events: auto;
        }

        /* Top Bar: Resources */
        .top-bar {
            display: flex;
            gap: 20px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            align-self: center;
        }

        .res-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 18px;
        }

        .res-icon { font-size: 24px; }
        .res-gold { color: var(--gold); }
        .res-food { color: var(--food); }
        .res-science { color: var(--science); }
        .res-culture { color: var(--culture); }

        /* Bottom Bar: Actions */
        .bottom-panel {
            display: flex;
            gap: 15px;
            align-self: center;
            margin-bottom: 20px;
        }

        .action-btn {
            background: linear-gradient(135deg, #2a2a4a, #1a1a2e);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
            text-align: center;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #3a3a5a, #2a2a4a);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            filter: grayscale(1);
        }

        .btn-cost {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }

        /* Minimap */
        .minimap-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            background: rgba(0,0,0,0.8);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            pointer-events: auto;
            cursor: pointer;
        }

        #minimapCanvas {
            width: 100%;
            height: 100%;
        }

        /* Main Menu */
        #mainMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2a2a4a 0%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            pointer-events: auto;
        }

        .menu-title {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(to right, #e94560, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(233, 69, 96, 0.5);
            letter-spacing: 2px;
        }

        .menu-desc {
            font-size: 18px;
            color: #ccc;
            max-width: 600px;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.6;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
        }

        .start-btn {
            padding: 15px 60px;
            font-size: 24px;
            background: linear-gradient(45deg, #e94560, #c0354a);
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(233, 69, 96, 0.8);
        }

        /* Notifications */
        #notifications {
            position: absolute;
            top: 80px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(22, 33, 62, 0.9);
            border-left: 4px solid var(--accent);
            padding: 10px 20px;
            border-radius: 4px;
            animation: slideIn 0.3s ease-out;
            backdrop-filter: blur(5px);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Layer -->
    <div class="ui-layer" id="uiLayer">
        <!-- Top Resources -->
        <div class="top-bar pointer-events-auto">
            <div class="res-item res-gold"><span class="res-icon">💰</span><span id="resGold">0</span></div>
            <div class="res-item res-food"><span class="res-icon">🍞</span><span id="resFood">0</span></div>
            <div class="res-item res-science"><span class="res-icon">🔬</span><span id="resScience">0</span></div>
            <div class="res-item res-culture"><span class="res-icon">⚔️</span><span id="resCulture">0</span></div>
            <div style="border-left: 1px solid #555; margin: 0 10px;"></div>
            <div class="res-item" style="color: #fff;"><span id="turnTime">Day 1</span></div>
        </div>

        <!-- Notifications -->
        <div id="notifications"></div>

        <!-- Bottom Actions -->
        <div class="bottom-panel pointer-events-auto" id="actionPanel">
            <button class="action-btn" onclick="game.trainUnit('settler')">
                <span>🚜 Поселенец</span>
                <span class="btn-cost">100 💰, 50 🍞</span>
            </button>
            <button class="action-btn" onclick="game.trainUnit('warrior')">
                <span>⚔️ Воин</span>
                <span class="btn-cost">60 💰, 20 🍞</span>
            </button>
            <button class="action-btn" onclick="game.trainUnit('archer')">
                <span>🏹 Лучник</span>
                <span class="btn-cost">80 💰, 30 🍞</span>
            </button>
            <button class="action-btn" onclick="game.researchTech()">
                <span>📜 Исследовать</span>
                <span class="btn-cost">200 🔬</span>
            </button>
        </div>

        <!-- Minimap -->
        <div class="minimap-container pointer-events-auto">
            <canvas id="minimapCanvas"></canvas>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu">
        <div class="menu-title">REAL-TIME CIV</div>
        <div class="menu-desc">
            Добро пожаловать, Правитель!<br><br>
            🖱️ <b>ЛКМ</b>: Выбор юнита / Перетаскивание карты (на пустом месте)<br>
            🖱️ <b>ПКМ</b>: Движение или Атака выбранного юнита<br>
            🏰 Основывайте города, создавайте армию и захватите мир!<br>
            Враги (Рим, Галлия, Египет) уже строят планы против вас.
        </div>
        <button class="start-btn" onclick="startGame()">НАЧАТЬ ИГРУ</button>
    </div>

<script>
/**
 * GAME ENGINE & LOGIC
 */

// Constants
const TILE_SIZE = 40;
const MAP_WIDTH = 60;
const MAP_HEIGHT = 60;
const COLORS = {
    player: '#4facfe',
    enemy1: '#ff416c', // Rome
    enemy2: '#43e97b', // Gaul
    enemy3: '#fa709a', // Egypt
    fog: '#0f0f1a'
};

const TERRAIN = {
    GRASS: { color: '#4caf50', symbol: '🌿', cost: 1 },
    FOREST: { color: '#2e7d32', symbol: '🌲', cost: 2 },
    MOUNTAIN: { color: '#5d4037', symbol: '⛰️', cost: 3 },
    WATER: { color: '#2196f3', symbol: '🌊', cost: 999 },
    DESERT: { color: '#fdd835', symbol: '🏜️', cost: 2 }
};

const UNITS = {
    settler: { icon: '🚜', hp: 20, dmg: 0, range: 1, speed: 0.03, costGold: 100, costFood: 50 },
    warrior: { icon: '⚔️', hp: 50, dmg: 10, range: 1, speed: 0.04, costGold: 60, costFood: 20 },
    archer: { icon: '🏹', hp: 40, dmg: 15, range: 3, speed: 0.035, costGold: 80, costFood: 30 },
    knight: { icon: '🐎', hp: 80, dmg: 20, range: 1, speed: 0.05, costGold: 150, costFood: 60 }
};

// Utils
const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const dist = (x1, y1, x2, y2) => Math.sqrt((x2-x1)**2 + (y2-y1)**2);

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.minimapCanvas = document.getElementById('minimapCanvas');
        this.mmCtx = this.minimapCanvas.getContext('2d');
        
        this.resize();
        window.addEventListener('resize', () => this.resize());

        // State
        this.map = [];
        this.entities = []; // Cities and Units
        this.particles = [];
        this.camera = { x: 0, y: 0 };
        this.dragStart = null;
        this.selectedEntity = null;
        this.day = 1;
        this.lastTime = 0;
        this.isRunning = false;

        // Player Resources
        this.player = {
            gold: 200,
            food: 200,
            science: 0,
            culture: 0,
            techLevel: 0
        };

        // AI Factions
        this.factions = [
            { id: 0, name: "Вы", color: COLORS.player, isAI: false },
            { id: 1, name: "Рим", color: COLORS.enemy1, isAI: true, aggression: 1.0 },
            { id: 2, name: "Галлия", color: COLORS.enemy2, isAI: true, aggression: 0.8 },
            { id: 3, name: "Египет", color: COLORS.enemy3, isAI: true, aggression: 0.6 }
        ];

        this.setupInput();
        this.generateMap();
        this.initWorld();
        
        // Start Loop
        requestAnimationFrame((t) => this.loop(t));
    }

    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        this.minimapCanvas.width = 200;
        this.minimapCanvas.height = 200;
        this.draw(); // Redraw immediately
    }

    generateMap() {
        // Simple noise-like generation
        for (let y = 0; y < MAP_HEIGHT; y++) {
            const row = [];
            for (let x = 0; x < MAP_WIDTH; x++) {
                const r = Math.random();
                let type = 'GRASS';
                if (r > 0.85) type = 'FOREST';
                else if (r > 0.95) type = 'MOUNTAIN';
                else if (r < 0.05) type = 'WATER';
                else if (r > 0.75 && r < 0.80) type = 'DESERT';
                
                row.push({ type, x, y, visible: false });
            }
            this.map.push(row);
        }
        
        // Clear spawn area for player
        for(let y=25; y<35; y++) {
            for(let x=25; x<35; x++) {
                if(this.map[y] && this.map[y][x]) this.map[y][x].type = 'GRASS';
            }
        }
    }

    initWorld() {
        // Spawn Player
        this.spawnCity(30, 30, 0);
        this.spawnUnit(32, 30, 'warrior', 0);
        this.spawnUnit(28, 30, 'settler', 0);

        // Spawn AI
        this.spawnCity(10, 10, 1);
        this.spawnCity(50, 10, 2);
        this.spawnCity(10, 50, 3);
        
        // Initial AI units
        for(let i=1; i<=3; i++) {
            this.spawnUnit(12, 12, 'warrior', i);
            this.spawnUnit(48, 12, 'warrior', i);
            this.spawnUnit(12, 48, 'warrior', i);
        }
    }

    spawnCity(x, y, factionId) {
        this.entities.push({
            type: 'city',
            x: x, y: y,
            faction: factionId,
            hp: 200,
            maxHp: 200,
            production: 0,
            producing: null
        });
        this.notify(`${this.factions[factionId].name} основал город!`);
    }

    spawnUnit(x, y, unitKey, factionId) {
        const stats = UNITS[unitKey];
        this.entities.push({
            type: 'unit',
            key: unitKey,
            x: x, y: y,
            targetX: x, targetY: y,
            faction: factionId,
            hp: stats.hp,
            maxHp: stats.hp,
            dmg: stats.dmg,
            range: stats.range,
            speed: stats.speed,
            state: 'idle', // idle, moving, attacking
            actionTimer: 0
        });
    }

    setupInput() {
        // Mouse Down
        this.canvas.addEventListener('mousedown', (e) => {
            if (!this.isRunning) return;
            const rect = this.canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            
            // Convert to world coords
            const wx = mx - this.camera.x;
            const wy = my - this.camera.y;
            const tx = Math.floor(wx / TILE_SIZE);
            const ty = Math.floor(wy / TILE_SIZE);

            if (e.button === 0) { // Left Click
                // Check entity selection
                const clickedEntity = this.entities.find(ent => 
                    Math.abs(ent.x - tx) < 1 && Math.abs(ent.y - ty) < 1 &&
                    ent.faction === 0 // Can only select own units directly by click
                );

                if (clickedEntity) {
                    this.selectedEntity = clickedEntity;
                } else {
                    // Start dragging camera if no entity selected
                    this.dragStart = { x: mx, y: my, camX: this.camera.x, camY: this.camera.y };
                    this.selectedEntity = null;
                }
            } else if (e.button === 2) { // Right Click
                e.preventDefault();
                if (this.selectedEntity && this.selectedEntity.faction === 0) {
                    this.issueCommand(this.selectedEntity, tx, ty);
                }
            }
        });

        // Mouse Move (Drag)
        window.addEventListener('mousemove', (e) => {
            if (this.dragStart) {
                const rect = this.canvas.getBoundingClientRect();
                const dx = e.clientX - rect.left - this.dragStart.x;
                const dy = e.clientY - rect.top - this.dragStart.y;
                this.camera.x = this.dragStart.camX + dx;
                this.camera.y = this.dragStart.camY + dy;
            }
        });

        // Mouse Up
        window.addEventListener('mouseup', () => {
            this.dragStart = null;
        });

        // Context Menu Disable
        this.canvas.addEventListener('contextmenu', e => e.preventDefault());
        
        // Zoom disable (wheel)
        this.canvas.addEventListener('wheel', e => e.preventDefault(), { passive: false });
    }

    issueCommand(unit, tx, ty) {
        // Check bounds
        if (tx < 0 || tx >= MAP_WIDTH || ty < 0 || ty >= MAP_HEIGHT) return;
        
        // Check terrain
        const tile = this.map[ty][tx];
        if (tile.type === 'WATER' || tile.type === 'MOUNTAIN') {
            this.notify("Нельзя идти сюда!");
            return;
        }

        // Check for enemy
        const target = this.entities.find(e => 
            Math.floor(e.x) === tx && Math.floor(e.y) === ty && e.faction !== unit.faction
        );

        if (target) {
            // Attack
            unit.state = 'attacking';
            unit.target = target;
            this.createParticle(tx * TILE_SIZE, ty * TILE_SIZE, '💥');
        } else {
            // Move
            unit.state = 'moving';
            unit.targetX = tx;
            unit.targetY = ty;
            this.createParticle(tx * TILE_SIZE, ty * TILE_SIZE, '🎯');
        }
    }

    createParticle(x, y, text) {
        this.particles.push({ x, y, text, life: 1.0, vy: -1 });
    }

    notify(msg) {
        const div = document.createElement('div');
        div.className = 'toast';
        div.innerText = msg;
        document.getElementById('notifications').appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    update(dt) {
        if (!this.isRunning) return;

        this.day += dt * 0.1; // Time flow
        document.getElementById('turnTime').innerText = `Day ${Math.floor(this.day)}`;

        // Resource Generation (Passive)
        if (Math.floor(this.day) % 1 === 0 && Math.floor(this.day * 10) % 10 === 0) {
            // Simplified: every second roughly
            let goldGen = 0, foodGen = 0, sciGen = 0;
            this.entities.forEach(e => {
                if (e.type === 'city' && e.faction === 0) {
                    goldGen += 5; foodGen += 5; sciGen += 2;
                }
            });
            this.player.gold += goldGen * dt;
            this.player.food += foodGen * dt;
            this.player.science += sciGen * dt;
            this.updateUI();
        }

        // Entity Logic
        this.entities.forEach((e, index) => {
            if (e.type === 'unit') {
                // Movement
                if (e.state === 'moving') {
                    const dx = e.targetX - e.x;
                    const dy = e.targetY - e.y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    
                    if (d < 0.1) {
                        e.x = e.targetX;
                        e.y = e.targetY;
                        e.state = 'idle';
                    } else {
                        e.x += (dx / d) * e.speed;
                        e.y += (dy / d) * e.speed;
                    }
                }
                
                // Combat (Auto attack if enemy near and idle)
                if (e.state === 'idle' && e.faction !== 0) {
                    // AI Logic: Find nearest enemy
                    let nearest = null;
                    let minDist = 5; // Aggro range
                    this.entities.forEach(other => {
                        if (other.faction !== e.faction && other.type === 'unit') {
                            const d = dist(e.x, e.y, other.x, other.y);
                            if (d < minDist) { minDist = d; nearest = other; }
                        }
                    });
                    if (nearest) {
                        e.state = 'attacking';
                        e.target = nearest;
                    }
                }

                if (e.state === 'attacking' && e.target) {
                    const d = dist(e.x, e.y, e.target.x, e.target.y);
                    if (d <= e.range + 0.5) {
                        // Attack cooldown
                        e.actionTimer += dt;
                        if (e.actionTimer > 1.0) { // 1 sec per attack
                            e.target.hp -= e.dmg;
                            this.createParticle(e.target.x * TILE_SIZE, e.target.y * TILE_SIZE, `-${e.dmg}`);
                            e.actionTimer = 0;
                            
                            if (e.target.hp <= 0) {
                                // Kill
                                const tIdx = this.entities.indexOf(e.target);
                                if (tIdx > -1) this.entities.splice(tIdx, 1);
                                e.state = 'idle';
                                e.target = null;
                                if (e.faction === 0) this.notify("Враг уничтожен!");
                            }
                        }
                    } else {
                        // Chase
                        e.state = 'moving';
                        e.targetX = e.target.x;
                        e.targetY = e.target.y;
                    }
                }
            }
        });

        // Cleanup dead entities
        this.entities = this.entities.filter(e => e.hp > 0);

        // Particles
        this.particles.forEach(p => {
            p.y += p.vy;
            p.life -= dt;
        });
        this.particles = this.particles.filter(p => p.life > 0);

        // AI Turns (Simple simulation)
        if (Math.floor(this.day * 2) % 20 === 0) {
            this.runAI();
        }

        this.updateUI();
    }

    runAI() {
        this.factions.forEach(f => {
            if (!f.isAI) return;
            // Simple AI: Spawn random unit near city if rich enough
            const cities = this.entities.filter(e => e.type === 'city' && e.faction === f.id);
            if (cities.length > 0 && Math.random() > 0.7) {
                const c = cities[0];
                const types = ['warrior', 'archer'];
                const type = types[rand(0, types.length-1)];
                this.spawnUnit(c.x + rand(-2, 2), c.y + rand(-2, 2), type, f.id);
            }
        });
    }

    trainUnit(type) {
        if (!this.selectedEntity || this.selectedEntity.type !== 'city' || this.selectedEntity.faction !== 0) {
            this.notify("Выберите свой город!");
            return;
        }

        const costG = UNITS[type].costGold;
        const costF = UNITS[type].costFood;

        if (this.player.gold >= costG && this.player.food >= costF) {
            this.player.gold -= costG;
            this.player.food -= costF;
            this.spawnUnit(this.selectedEntity.x + 1, this.selectedEntity.y, type, 0);
            this.notify(`Обучен ${type}!`);
            this.updateUI();
        } else {
            this.notify("Недостаточно ресурсов!");
        }
    }

    researchTech() {
        if (this.player.science >= 200) {
            this.player.science -= 200;
            this.player.techLevel++;
            this.notify(`Технология изучена! Уровень ${this.player.techLevel}`);
            // Bonus
            this.player.gold += 100;
            this.updateUI();
        } else {
            this.notify("Нужно 200 науки!");
        }
    }

    updateUI() {
        document.getElementById('resGold').innerText = Math.floor(this.player.gold);
        document.getElementById('resFood').innerText = Math.floor(this.player.food);
        document.getElementById('resScience').innerText = Math.floor(this.player.science);
        document.getElementById('resCulture').innerText = Math.floor(this.player.culture);
    }

    draw() {
        // Clear
        this.ctx.fillStyle = '#0f0f1a';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        this.ctx.save();
        this.ctx.translate(this.camera.x, this.camera.y);

        // Draw Map (Culling for performance)
        const startCol = Math.floor(-this.camera.x / TILE_SIZE);
        const endCol = startCol + (this.canvas.width / TILE_SIZE) + 1;
        const startRow = Math.floor(-this.camera.y / TILE_SIZE);
        const endRow = startRow + (this.canvas.height / TILE_SIZE) + 1;

        for (let y = startRow; y <= endRow; y++) {
            for (let x = startCol; x <= endCol; x++) {
                if (y >= 0 && y < MAP_HEIGHT && x >= 0 && x < MAP_WIDTH) {
                    const tile = this.map[y][x];
                    const tx = x * TILE_SIZE;
                    const ty = y * TILE_SIZE;
                    
                    // Base
                    this.ctx.fillStyle = TERRAIN[tile.type].color;
                    this.ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
                    
                    // Grid lines (subtle)
                    this.ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                    this.ctx.strokeRect(tx, ty, TILE_SIZE, TILE_SIZE);

                    // Symbol
                    this.ctx.font = '20px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    this.ctx.fillText(TERRAIN[tile.type].symbol, tx + TILE_SIZE/2, ty + TILE_SIZE/2);
                }
            }
        }

        // Draw Entities
        this.entities.forEach(e => {
            const ex = e.x * TILE_SIZE + TILE_SIZE/2;
            const ey = e.y * TILE_SIZE + TILE_SIZE/2;
            
            // Shadow
            this.ctx.fillStyle = 'rgba(0,0,0,0.3)';
            this.ctx.beginPath();
            this.ctx.arc(ex, ey + 5, TILE_SIZE/3, 0, Math.PI*2);
            this.ctx.fill();

            // Icon
            let icon = '';
            if (e.type === 'city') icon = e.faction === 0 ? '🏰' : '🏯';
            else icon = UNITS[e.key].icon;

            this.ctx.font = '30px Arial';
            this.ctx.textAlign = 'center';
            this.ctx.textBaseline = 'middle';
            
            // Selection Ring
            if (this.selectedEntity === e) {
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.arc(ex, ey, TILE_SIZE/1.5, 0, Math.PI*2);
                this.ctx.stroke();
                
                // Glow
                this.ctx.shadowColor = this.factions[e.faction].color;
                this.ctx.shadowBlur = 15;
            }

            this.ctx.fillStyle = this.factions[e.faction].color;
            this.ctx.fillText(icon, ex, ey);
            this.ctx.shadowBlur = 0;

            // Health Bar
            if (e.hp < e.maxHp) {
                const pct = e.hp / e.maxHp;
                this.ctx.fillStyle = 'red';
                this.ctx.fillRect(ex - 15, ey - 25, 30, 4);
                this.ctx.fillStyle = '#0f0';
                this.ctx.fillRect(ex - 15, ey - 25, 30 * pct, 4);
            }
        });

        // Particles
        this.particles.forEach(p => {
            this.ctx.globalAlpha = p.life;
            this.ctx.font = '20px Arial';
            this.ctx.fillStyle = '#fff';
            this.ctx.fillText(p.text, p.x, p.y);
            this.ctx.globalAlpha = 1.0;
        });

        this.ctx.restore();

        // Draw Minimap
        this.drawMinimap();
    }

    drawMinimap() {
        const w = this.minimapCanvas.width;
        const h = this.minimapCanvas.height;
        const scaleX = w / MAP_WIDTH;
        const scaleY = h / MAP_HEIGHT;

        this.mmCtx.fillStyle = '#000';
        this.mmCtx.fillRect(0, 0, w, h);

        this.entities.forEach(e => {
            this.mmCtx.fillStyle = this.factions[e.faction].color;
            const mx = e.x * scaleX;
            const my = e.y * scaleY;
            const size = e.type === 'city' ? 4 : 2;
            this.mmCtx.fillRect(mx - size/2, my - size/2, size, size);
        });

        // Camera Viewport on Minimap
        this.mmCtx.strokeStyle = 'white';
        this.mmCtx.lineWidth = 1;
        const vx = -this.camera.x * scaleX;
        const vy = -this.camera.y * scaleY;
        const vw = this.canvas.width * scaleX;
        const vh = this.canvas.height * scaleY;
        this.mmCtx.strokeRect(vx, vy, vw, vh);
    }

    loop(timestamp) {
        const dt = (timestamp - this.lastTime) / 1000;
        this.lastTime = timestamp;

        if (this.isRunning) {
            this.update(dt);
            this.draw();
        }
        
        requestAnimationFrame((t) => this.loop(t));
    }
}

// Global Instance
let game;

function startGame() {
    document.getElementById('mainMenu').classList.add('hidden');
    game = new Game();
    game.isRunning = true;
}

</script>
