<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Civilization</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-bg: rgba(22, 33, 62, 0.95);
            --accent: #4ecca3;
            --danger: #e94560;
            --text: #ffffff;
            --highlight: #ffd700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            user-select: none;
        }

        /* Canvas */
        #gameCanvas {
            display: block;
            cursor: crosshair;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .pointer-events-auto {
            pointer-events: auto;
        }

        /* Top Bar: Resources */
        #top-bar {
            background: var(--panel-bg);
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .res-item {
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }

        .res-icon { margin-right: 8px; font-size: 24px; }

        /* Bottom Bar: Actions & Info */
        #bottom-panel {
            display: flex;
            padding: 15px;
            gap: 15px;
            align-items: flex-end;
            justify-content: space-between;
        }

        #selection-info {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            min-width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #actions-panel {
            background: var(--panel-bg);
            padding: 10px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            border: 1px solid #444;
        }

        button {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border: 1px solid var(--accent);
            color: white;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
        }

        button:hover:not(:disabled) {
            background: linear-gradient(135deg, #34495e, var(--accent));
            transform: translateY(-2px);
            box-shadow: 0 0 10px var(--accent);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #555;
        }

        .btn-icon { font-size: 20px; margin-bottom: 4px; }

        /* Minimap */
        #minimap-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0,0,0,0.8);
            border: 2px solid var(--accent);
            border-radius: 4px;
            pointer-events: auto;
            overflow: hidden;
        }

        #minimap {
            width: 100%;
            height: 100%;
        }

        /* Main Menu */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: auto;
        }

        h1 {
            font-size: 64px;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        .menu-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            margin-top: 20px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .menu-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px var(--accent);
        }

        /* Notifications */
        #notifications {
            position: absolute;
            top: 80px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(44, 62, 80, 0.9);
            border-left: 4px solid var(--accent);
            padding: 10px 20px;
            border-radius: 4px;
            animation: slideIn 0.3s ease-out forwards, fadeOut 0.5s ease-in 2.5s forwards;
            color: white;
            font-weight: bold;
        }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* Context Menu */
        #context-menu {
            position: absolute;
            background: var(--panel-bg);
            border: 1px solid var(--accent);
            border-radius: 4px;
            padding: 5px 0;
            display: none;
            z-index: 50;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .ctx-item {
            padding: 8px 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .ctx-item:hover {
            background: var(--accent);
            color: #000;
        }
    </style>
</head>
<body>

    <!-- Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Layer -->
    <div id="ui-layer">
        <!-- Top Bar -->
        <div id="top-bar" class="pointer-events-auto">
            <div class="res-item"><span class="res-icon">💰</span><span id="res-gold">0</span></div>
            <div class="res-item"><span class="res-icon">🍞</span><span id="res-food">0</span></div>
            <div class="res-item"><span class="res-icon">🔬</span><span id="res-science">0</span></div>
            <div class="res-item"><span class="res-icon">⚔️</span><span id="res-culture">0</span></div>
            <div style="margin-left: auto; color: #aaa; font-size: 14px;">День: <span id="game-day">1</span></div>
        </div>

        <!-- Notifications -->
        <div id="notifications"></div>

        <!-- Context Menu -->
        <div id="context-menu"></div>

        <!-- Bottom Panel -->
        <div id="bottom-panel" class="pointer-events-auto">
            <div id="selection-info">
                <h3 id="sel-name" style="margin: 0 0 5px 0; color: var(--accent);">Ничего не выбрано</h3>
                <p id="sel-desc" style="margin: 0; font-size: 14px; color: #ccc;">Кликните ЛКМ по объекту или перетаскивайте карту.</p>
                <div id="sel-stats" style="margin-top: 8px; font-size: 13px;"></div>
            </div>

            <div id="actions-panel">
                <!-- Buttons injected by JS -->
            </div>
        </div>

        <!-- Minimap -->
        <div id="minimap-container">
            <canvas id="minimap"></canvas>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu">
        <h1>CIV REAL-TIME</h1>
        <p style="color: #aaa; max-width: 600px; text-align: center; line-height: 1.6;">
            Стратегия в реальном времени.<br>
            Управляйте империей, развивайте технологии и побеждайте врагов.<br><br>
            🖱️ <b>ЛКМ</b>: Выбор / Перетаскивание карты<br>
            🖱️ <b>ПКМ</b>: Движение / Атака / Отмена
        </p>
        <button class="menu-btn" onclick="startGame()">НАЧАТЬ ИГРУ</button>
    </div>

<script>
/**
 * REAL-TIME CIVILIZATION ENGINE
 * Полностью переписанный движок с чистым кодом и архитектурой.
 */

// --- КОНФИГУРАЦИЯ ---
const CONFIG = {
    TILE_SIZE: 48,
    MAP_WIDTH: 60,
    MAP_HEIGHT: 60,
    COLORS: {
        WATER: '#4fa4b8',
        GRASS: '#567d46',
        FOREST: '#2d4a22',
        MOUNTAIN: '#8c8c8c',
        DESERT: '#e6c288',
        HIGHLIGHT: 'rgba(255, 255, 255, 0.3)',
        PLAYER: '#4ecca3',
        ENEMY: '#e94560',
        NEUTRAL: '#f1c40f'
    },
    TERRAIN_TYPES: ['WATER', 'GRASS', 'FOREST', 'MOUNTAIN', 'DESERT'],
    UNITS: {
        WARRIOR: { name: 'Воин', icon: '⚔️', cost: { gold: 50, food: 20 }, hp: 100, dmg: 15, range: 1, speed: 0.08 },
        ARCHER: { name: 'Лучник', icon: '🏹', cost: { gold: 70, food: 30 }, hp: 80, dmg: 12, range: 3, speed: 0.07 },
        CAVALRY: { name: 'Кавалерия', icon: '🐎', cost: { gold: 100, food: 50 }, hp: 120, dmg: 20, range: 1, speed: 0.12 },
        SETTLER: { name: 'Поселенец', icon: '🚜', cost: { gold: 100, food: 50 }, hp: 50, dmg: 0, range: 0, speed: 0.05 }
    },
    BUILDINGS: {
        HOUSE: { name: 'Дом', cost: { gold: 60 }, bonus: 'food' },
        FORGE: { name: 'Кузница', cost: { gold: 100 }, bonus: 'prod' },
        LIBRARY: { name: 'Библиотека', cost: { gold: 80 }, bonus: 'science' }
    }
};

// --- СОСТОЯНИЕ ИГРЫ ---
let gameState = {
    running: false,
    lastTime: 0,
    day: 1,
    camera: { x: 0, y: 0, zoom: 1 },
    map: [],
    entities: [], // Города и юниты
    particles: [],
    selectedEntity: null,
    resources: { gold: 200, food: 200, science: 0, culture: 0 },
    techs: [],
    playerColor: CONFIG.COLORS.PLAYER,
    aiCivs: []
};

// --- КЛАССЫ ---

class Entity {
    constructor(x, y, type, owner) {
        this.id = Math.random().toString(36).substr(2, 9);
        this.x = x;
        this.y = y;
        this.type = type; // 'city', 'unit'
        this.subtype = null; // 'warrior', 'house', etc.
        this.owner = owner; // 'player', 'ai_1', etc.
        this.hp = 100;
        this.maxHp = 100;
        this.progress = 0; // Для производства
        this.targetX = x;
        this.targetY = y;
        this.path = [];
        this.action = 'idle'; // idle, move, attack, build
        this.cooldown = 0;
    }
}

class Particle {
    constructor(x, y, text, color) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.life = 1.0;
        this.vy = -0.5;
    }
    update() {
        this.y += this.vy;
        this.life -= 0.02;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.font = 'bold 16px Arial';
        ctx.fillText(this.text, this.x, this.y);
        ctx.globalAlpha = 1.0;
    }
}

// --- СИСТЕМНЫЕ ФУНКЦИИ ---

function init() {
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    setupInput();
    requestAnimationFrame(gameLoop);
}

function startGame() {
    document.getElementById('main-menu').style.display = 'none';
    generateMap();
    spawnPlayer();
    spawnAI();
    gameState.running = true;
    gameState.lastTime = performance.now();
    showNotification("Добро пожаловать, Правитель!", "Ваша империя ждет величия.");
    updateUI();
}

function generateMap() {
    gameState.map = [];
    for (let y = 0; y < CONFIG.MAP_HEIGHT; y++) {
        let row = [];
        for (let x = 0; x < CONFIG.MAP_WIDTH; x++) {
            // Простая процедурная генерация
            const rand = Math.random();
            let type = 'GRASS';
            if (rand < 0.15) type = 'WATER';
            else if (rand < 0.25) type = 'FOREST';
            else if (rand < 0.35) type = 'MOUNTAIN';
            else if (rand < 0.45) type = 'DESERT';
            
            // Сглаживание (упрощенное)
            if (x > 0 && row[x-1] === 'WATER' && Math.random() < 0.3) type = 'WATER';
            
            row.push({
                x, y,
                type: type,
                color: CONFIG.COLORS[type],
                resource: Math.random() > 0.9 ? 'gold' : null // Редкие ресурсы
            });
        }
        gameState.map.push(row);
    }
    
    // Центрируем камеру на игроке (примерно)
    gameState.camera.x = (CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE) / 2 - canvas.width / 2;
    gameState.camera.y = (CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE) / 2 - canvas.height / 2;
}

function spawnPlayer() {
    // Найти безопасное место
    let sx = 10, sy = 10;
    while(gameState.map[sy][sx].type === 'WATER') { sx++; }
    
    const city = new Entity(sx, sy, 'city', 'player');
    city.subtype = 'capital';
    city.hp = 500;
    city.maxHp = 500;
    gameState.entities.push(city);
    
    // Стартовый воин
    const warrior = new Entity(sx + 1, sy, 'unit', 'player');
    warrior.subtype = 'WARRIOR';
    warrior.hp = CONFIG.UNITS.WARRIOR.hp;
    warrior.maxHp = warrior.hp;
    gameState.entities.push(warrior);
}

function spawnAI() {
    const aiNames = ['Рим', 'Галлия', 'Египет'];
    const colors = ['#e74c3c', '#9b59b6', '#f39c12'];
    
    aiNames.forEach((name, i) => {
        let sx = Math.floor(Math.random() * (CONFIG.MAP_WIDTH - 20)) + 20;
        let sy = Math.floor(Math.random() * (CONFIG.MAP_HEIGHT - 20)) + 20;
        while(gameState.map[sy][sx].type === 'WATER') { sx = (sx + 1) % CONFIG.MAP_WIDTH; }
        
        const city = new Entity(sx, sy, 'city', `ai_${i}`);
        city.subtype = 'capital';
        city.hp = 500;
        city.name = name;
        city.color = colors[i];
        gameState.entities.push(city);
        
        gameState.aiCivs.push({
            id: `ai_${i}`,
            name: name,
            color: colors[i],
            cities: [city],
            units: [],
            aggression: 0.5 + Math.random() * 0.5
        });
    });
}

// --- ИГРОВОЙ ЦИКЛ ---

function gameLoop(timestamp) {
    const dt = (timestamp - gameState.lastTime) / 1000;
    gameState.lastTime = timestamp;

    if (gameState.running) {
        update(dt);
        draw();
        updateUI();
    }

    requestAnimationFrame(gameLoop);
}

function update(dt) {
    // День
    gameState.day += dt * 0.1; // Замедленное время
    
    // Ресурсы (пассивный доход)
    let goldInc = 1, foodInc = 1, sciInc = 0;
    gameState.entities.forEach(e => {
        if (e.owner === 'player' && e.type === 'city') {
            goldInc += 2;
            foodInc += 3;
            sciInc += 1;
            // Производство в городе
            if (e.production) {
                e.progress += dt * (e.hasForge ? 1.5 : 1);
                if (e.progress >= 100) {
                    completeProduction(e);
                }
            }
        }
        
        // Движение юнитов
        if (e.type === 'unit' && e.action === 'move') {
            const dx = e.targetX - e.x;
            const dy = e.targetY - e.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const speed = CONFIG.UNITS[e.subtype].speed;
            
            if (dist < 0.1) {
                e.x = e.targetX;
                e.y = e.targetY;
                e.action = 'idle';
                e.path = [];
            } else {
                e.x += (dx / dist) * speed;
                e.y += (dy / dist) * speed;
            }
        }
        
        // Бой (авто-атака)
        if (e.type === 'unit' && e.owner.startsWith('ai_') || e.owner === 'player') {
            if (e.cooldown > 0) e.cooldown -= dt;
            if (e.cooldown <= 0) {
                const target = findNearestEnemy(e);
                const unitStats = CONFIG.UNITS[e.subtype];
                if (target && getDist(e, target) <= (unitStats.range + 1)) {
                    attack(e, target);
                    e.cooldown = 2; // Секунды между атаками
                }
            }
        }
    });

    // ИИ Логика
    updateAI(dt);

    // Частицы
    gameState.particles = gameState.particles.filter(p => p.life > 0);
    gameState.particles.forEach(p => p.update());

    // Доход ресурсов
    if (Math.floor(gameState.day) > Math.floor((gameState.day - dt))) {
        gameState.resources.gold += goldInc;
        gameState.resources.food += foodInc;
        gameState.resources.science += sciInc;
    }
}

function findNearestEnemy(me) {
    let nearest = null;
    let minDst = 999;
    gameState.entities.forEach(e => {
        if (e.owner !== me.owner && e.type === 'unit' && e.hp > 0) {
            const d = getDist(me, e);
            if (d < minDst) {
                minDst = d;
                nearest = e;
            }
        }
    });
    return nearest;
}

function getDist(a, b) {
    return Math.sqrt(Math.pow(a.x - b.x, 2) + Math.pow(a.y - b.y, 2));
}

function attack(attacker, defender) {
    const dmg = CONFIG.UNITS[attacker.subtype]?.dmg || 10;
    defender.hp -= dmg;
    
    // Эффект
    gameState.particles.push(new Particle(
        defender.x * CONFIG.TILE_SIZE, 
        defender.y * CONFIG.TILE_SIZE, 
        `-${dmg}`, '#e94560'
    ));

    if (defender.hp <= 0) {
        killEntity(defender);
        if (attacker.owner === 'player') {
            gameState.resources.culture += 10;
            showNotification("Победа!", `Враг уничтожен. +10 Культуры`);
        }
    }
}

function killEntity(e) {
    gameState.entities = gameState.entities.filter(ent => ent !== e);
    if (gameState.selectedEntity === e) {
        gameState.selectedEntity = null;
        updateSelectionPanel();
    }
}

function completeProduction(city) {
    const prod = city.production;
    city.production = null;
    city.progress = 0;
    
    if (prod.type === 'unit') {
        const unit = new Entity(city.x + 1, city.y, 'unit', city.owner);
        unit.subtype = prod.subtype;
        const stats = CONFIG.UNITS[prod.subtype];
        unit.hp = stats.hp;
        unit.maxHp = stats.hp;
        gameState.entities.push(unit);
        showNotification("Готово", `${stats.name} создан в ${city.subtype === 'capital' ? 'столице' : 'городе'}`);
    }
}

function updateAI(dt) {
    gameState.aiCivs.forEach(ai => {
        // Простая логика: если есть ресурсы, строить юнитов
        // В полной версии тут был бы сложный менеджер ресурсов
        const myUnits = gameState.entities.filter(e => e.owner === ai.id && e.type === 'unit');
        const myCities = gameState.entities.filter(e => e.owner === ai.id && e.type === 'city');
        
        if (myCities.length > 0 && myUnits.length < myCities.length * 2) {
            // Шанс создать юнита
            if (Math.random() < 0.01) {
                const city = myCities[0];
                const types = ['WARRIOR', 'ARCHER'];
                const type = types[Math.floor(Math.random() * types.length)];
                
                // Мгновенное создание для простоты ИИ в демо
                const unit = new Entity(city.x + (Math.random()*4-2), city.y + (Math.random()*4-2), 'unit', ai.id);
                unit.subtype = type;
                unit.hp = CONFIG.UNITS[type].hp;
                gameState.entities.push(unit);
            }
        }
        
        // Движение к игроку (агрессия)
        myUnits.forEach(u => {
            if (u.action === 'idle' && Math.random() < 0.02) {
                const playerCity = gameState.entities.find(e => e.owner === 'player' && e.type === 'city');
                if (playerCity) {
                    u.targetX = playerCity.x;
                    u.targetY = playerCity.y;
                    u.action = 'move';
                }
            }
        });
    });
}

// --- ОТРИСОВКА ---

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap');
const mmCtx = minimapCanvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    minimapCanvas.width = 150;
    minimapCanvas.height = 150;
}

function draw() {
    // Очистка
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const ts = CONFIG.TILE_SIZE;
    const camX = Math.floor(gameState.camera.x / ts);
    const camY = Math.floor(gameState.camera.y / ts);
    const cols = Math.ceil(canvas.width / ts) + 1;
    const rows = Math.ceil(canvas.height / ts) + 1;

    ctx.save();
    ctx.translate(-gameState.camera.x, -gameState.camera.y);

    // Карта
    for (let y = camY; y < camY + rows; y++) {
        for (let x = camX; x < camX + cols; x++) {
            if (y >= 0 && y < CONFIG.MAP_HEIGHT && x >= 0 && x < CONFIG.MAP_WIDTH) {
                const tile = gameState.map[y][x];
                ctx.fillStyle = tile.color;
                ctx.fillRect(x * ts, y * ts, ts, ts);
                
                // Детали
                if (tile.type === 'FOREST') {
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.beginPath();
                    ctx.arc(x*ts+ts/2, y*ts+ts/2, ts/3, 0, Math.PI*2);
                    ctx.fill();
                } else if (tile.type === 'MOUNTAIN') {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath();
                    ctx.moveTo(x*ts+ts/2, y*ts+5);
                    ctx.lineTo(x*ts+ts-5, y*ts+ts-5);
                    ctx.lineTo(x*ts+5, y*ts+ts-5);
                    ctx.fill();
                }
            }
        }
    }

    // Сущности
    gameState.entities.forEach(e => {
        const cx = e.x * ts + ts/2;
        const cy = e.y * ts + ts/2;
        
        // Тень
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.ellipse(cx, cy + ts/3, ts/3, ts/6, 0, 0, Math.PI*2);
        ctx.fill();

        // Цвет владельца (кольцо)
        const color = e.owner === 'player' ? CONFIG.COLORS.PLAYER : 
                      (gameState.aiCivs.find(a => a.id === e.owner)?.color || '#fff');
        
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, ts/2 - 2, 0, Math.PI*2);
        ctx.stroke();

        // Иконка
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        let icon = '❓';
        if (e.type === 'city') icon = e.subtype === 'capital' ? '🏙️' : '🏰';
        else if (e.subtype) icon = CONFIG.UNITS[e.subtype].icon;
        
        ctx.fillText(icon, cx, cy);

        // Выделение
        if (gameState.selectedEntity === e) {
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 3]);
            ctx.beginPath();
            ctx.arc(cx, cy, ts/2 + 4, 0, Math.PI*2);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // HP Bar
        if (e.hp < e.maxHp) {
            const pct = e.hp / e.maxHp;
            ctx.fillStyle = '#333';
            ctx.fillRect(cx - 15, cy - ts/2 - 8, 30, 4);
            ctx.fillStyle = pct > 0.5 ? '#2ecc71' : '#e74c3c';
            ctx.fillRect(cx - 15, cy - ts/2 - 8, 30 * pct, 4);
        }
        
        // Прогресс строительства
        if (e.production) {
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(cx - 15, cy + ts/2 + 2, 30 * (e.progress/100), 3);
        }
    });

    // Частицы
    gameState.particles.forEach(p => p.draw(ctx));

    // Курсор действия (при движении)
    if (mouse.dragging) {
        // Рисуем рамку перетаскивания если нужно, но пока просто курсор
    }

    ctx.restore();

    // Миникарта
    drawMinimap();
}

function drawMinimap() {
    mmCtx.fillStyle = '#000';
    mmCtx.fillRect(0, 0, 150, 150);
    
    const scale = 150 / (CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE); // Очень мелко
    
    // Упрощенно: рисуем точки
    gameState.entities.forEach(e => {
        const mx = e.x * CONFIG.TILE_SIZE * scale;
        const my = e.y * CONFIG.TILE_SIZE * scale;
        mmCtx.fillStyle = e.owner === 'player' ? '#4ecca3' : '#e94560';
        mmCtx.fillRect(mx, my, 3, 3);
    });
    
    // Камера на миникарте
    const cx = gameState.camera.x * scale;
    const cy = gameState.camera.y * scale;
    const cw = canvas.width * scale;
    const ch = canvas.height * scale;
    
    mmCtx.strokeStyle = '#fff';
    mmCtx.lineWidth = 1;
    mmCtx.strokeRect(cx, cy, cw, ch);
}

// --- УПРАВЛЕНИЕ И ВВОД ---

const mouse = { x: 0, y: 0, isDown: false, dragStartX: 0, dragStartY: 0, dragging: false };

function setupInput() {
    canvas.addEventListener('mousedown', e => {
        if (e.button === 0) { // ЛКМ
            mouse.isDown = true;
            mouse.dragStartX = e.clientX;
            mouse.dragStartY = e.clientY;
            mouse.dragging = false; // Пока не знаем
            
            // Проверка клика по объекту
            handleLeftClick(e.clientX, e.clientY);
        } else if (e.button === 2) { // ПКМ
            e.preventDefault();
            handleRightClick(e.clientX, e.clientY);
        }
    });

    canvas.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        
        if (mouse.isDown) {
            const dx = e.clientX - mouse.dragStartX;
            const dy = e.clientY - mouse.dragStartY;
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                mouse.dragging = true;
                gameState.camera.x -= dx;
                gameState.camera.y -= dy;
                mouse.dragStartX = e.clientX;
                mouse.dragStartY = e.clientY;
            }
        }
    });

    canvas.addEventListener('mouseup', () => {
        mouse.isDown = false;
        mouse.dragging = false;
    });

    canvas.addEventListener('contextmenu', e => e.preventDefault());
    
    // Закрытие контекстного меню при клике в пустоту
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#context-menu') && !e.target.closest('#gameCanvas')) {
            hideContextMenu();
        }
    });
}

function getTileFromScreen(sx, sy) {
    const tx = (sx + gameState.camera.x) / CONFIG.TILE_SIZE;
    const ty = (sy + gameState.camera.y) / CONFIG.TILE_SIZE;
    return { x: Math.floor(tx), y: Math.floor(ty) };
}

function handleLeftClick(sx, sy) {
    if (mouse.dragging) return; // Это было перетаскивание

    const t = getTileFromScreen(sx, sy);
    let clickedEntity = null;
    
    // Ищем сущность в тайле
    gameState.entities.forEach(e => {
        if (Math.abs(e.x - t.x) < 0.8 && Math.abs(e.y - t.y) < 0.8) {
            clickedEntity = e;
        }
    });

    gameState.selectedEntity = clickedEntity;
    updateSelectionPanel();
    hideContextMenu();
}

function handleRightClick(sx, sy) {
    if (!gameState.selectedEntity || gameState.selectedEntity.type !== 'unit') {
        hideContextMenu();
        return;
    }

    const t = getTileFromScreen(sx, sy);
    const unit = gameState.selectedEntity;
    
    // Проверяем, есть ли враг в этой клетке
    const enemy = gameState.entities.find(e => 
        e.owner !== unit.owner && 
        Math.abs(e.x - t.x) < 0.8 && 
        Math.abs(e.y - t.y) < 0.8 &&
        e.type === 'unit'
    );

    if (enemy) {
        // Атака
        unit.targetX = enemy.x;
        unit.targetY = enemy.y;
        unit.action = 'move'; // Двинуться к врагу, бой начнется автоматически при сближении
        showNotification("Атака!", `Юнит атакует ${enemy.subtype || 'цель'}`);
    } else {
        // Движение
        // Проверка на воду
        const tile = gameState.map[t.y]?.[t.x];
        if (tile && tile.type === 'WATER') {
            showNotification("Нельзя", "Юниты не могут ходить по воде!");
            return;
        }
        unit.targetX = t.x;
        unit.targetY = t.y;
        unit.action = 'move';
        createClickEffect(t.x, t.y);
    }
    
    hideContextMenu();
}

function createClickEffect(x, y) {
    // Визуальный эффект клика (можно добавить частицы)
}

// --- ИНТЕРФЕЙС ---

function updateUI() {
    document.getElementById('res-gold').innerText = Math.floor(gameState.resources.gold);
    document.getElementById('res-food').innerText = Math.floor(gameState.resources.food);
    document.getElementById('res-science').innerText = Math.floor(gameState.resources.science);
    document.getElementById('res-culture').innerText = Math.floor(gameState.resources.culture);
    document.getElementById('game-day').innerText = Math.floor(gameState.day);
    
    updateActionsPanel();
}

function updateSelectionPanel() {
    const panelName = document.getElementById('sel-name');
    const panelDesc = document.getElementById('sel-desc');
    const panelStats = document.getElementById('sel-stats');
    
    if (!gameState.selectedEntity) {
        panelName.innerText = "Ничего не выбрано";
        panelDesc.innerText = "Кликните ЛКМ по городу или юниту.";
        panelStats.innerText = "";
        return;
    }
    
    const e = gameState.selectedEntity;
    if (e.type === 'city') {
        panelName.innerText = e.subtype === 'capital' ? "Столица" : "Город";
        panelName.style.color = e.owner === 'player' ? CONFIG.COLORS.PLAYER : CONFIG.COLORS.ENEMY;
        panelDesc.innerText = "Производит ресурсы и юнитов.";
        panelStats.innerText = `HP: ${Math.floor(e.hp)}/${e.maxHp}\nДоход: +2💰 +3🍞`;
    } else if (e.type === 'unit') {
        const stats = CONFIG.UNITS[e.subtype];
        panelName.innerText = stats.name;
        panelName.style.color = e.owner === 'player' ? CONFIG.COLORS.PLAYER : CONFIG.COLORS.ENEMY;
        panelDesc.innerText = `Скорость: ${stats.speed*100} | Урон: ${stats.dmg}`;
        panelStats.innerText = `HP: ${Math.floor(e.hp)}/${e.maxHp}\nПравая кнопка мыши для движения.`;
    }
}

function updateActionsPanel() {
    const panel = document.getElementById('actions-panel');
    panel.innerHTML = '';
    
    if (!gameState.selectedEntity || gameState.selectedEntity.owner !== 'player') {
        panel.innerHTML = '<div style="grid-column: span 3; text-align: center; color: #777;">Выберите свой объект</div>';
        return;
    }
    
    const e = gameState.selectedEntity;
    
    if (e.type === 'city') {
        // Кнопки постройки
        createBtn(panel, '⚔️', 'Воин', '50💰 20🍞', () => queueProduction(e, 'unit', 'WARRIOR'));
        createBtn(panel, '🏹', 'Лучник', '70💰 30🍞', () => queueProduction(e, 'unit', 'ARCHER'));
        createBtn(panel, '🚜', 'Поселенец', '100💰 50🍞', () => queueProduction(e, 'unit', 'SETTLER'));
        createBtn(panel, '🏠', 'Дом', '60💰', () => queueProduction(e, 'building', 'HOUSE'));
        createBtn(panel, '🔨', 'Кузница', '100💰', () => queueProduction(e, 'building', 'FORGE'));
        createBtn(panel, '📚', 'Библиотека', '80💰', () => queueProduction(e, 'building', 'LIBRARY'));
    } else if (e.type === 'unit') {
        createBtn(panel, '🛑', 'Стоп', '', () => { e.action = 'idle'; });
        createBtn(panel, '🔍', 'Разведка', '', () => { 
            // Случайное движение для примера
            e.targetX = e.x + Math.floor(Math.random()*10-5);
            e.targetY = e.y + Math.floor(Math.random()*10-5);
            e.action = 'move';
        });
    }
}

function createBtn(parent, icon, text, cost, onClick) {
    const btn = document.createElement('button');
    btn.innerHTML = `<span class="btn-icon">${icon}</span><span>${text}</span><span style="font-size:10px; opacity:0.7">${cost}</span>`;
    
    // Проверка доступности (упрощенная)
    if (cost.includes('💰')) {
        const c = parseInt(cost);
        if (gameState.resources.gold < c) btn.disabled = true;
    }
    
    btn.onclick = onClick;
    parent.appendChild(btn);
}

function queueProduction(city, type, subtype) {
    if (city.production) {
        showNotification("Очередь", "Город уже что-то строит!");
        return;
    }
    
    let costGold = 0, costFood = 0;
    if (type === 'unit') {
        costGold = CONFIG.UNITS[subtype].cost.gold;
        costFood = CONFIG.UNITS[subtype].cost.food;
    } else {
        costGold = CONFIG.BUILDINGS[subtype].cost.gold;
    }
    
    if (gameState.resources.gold >= costGold && gameState.resources.food >= costFood) {
        gameState.resources.gold -= costGold;
        gameState.resources.food -= costFood;
        city.production = { type, subtype };
        city.progress = 0;
        showNotification("Строительство", `${subtype || type} начал строиться`);
        updateUI();
    } else {
        showNotification("Не хватает ресурсов!", `Нужно: ${costGold}💰 ${costFood}🍞`);
    }
}

function showNotification(title, msg) {
    const container = document.getElementById('notifications');
    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `<strong>${title}</strong><br>${msg}`;
    container.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function hideContextMenu() {
    document.getElementById('context-menu').style.display = 'none';
}

// Запуск
init();

</script>
