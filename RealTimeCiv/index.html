<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilization: Real-Time Empire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        /* Главное меню */
        #main-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #main-menu h1 {
            font-size: 64px;
            color: #4a9eff;
            text-shadow: 0 0 30px rgba(74, 158, 255, 0.5);
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(74, 158, 255, 0.3); }
            to { text-shadow: 0 0 40px rgba(74, 158, 255, 0.8), 0 0 60px rgba(74, 158, 255, 0.4); }
        }

        #main-menu p {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 40px;
        }

        .menu-btn {
            padding: 15px 60px;
            font-size: 20px;
            background: linear-gradient(135deg, #4a9eff, #0066cc);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(74, 158, 255, 0.4);
        }

        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(74, 158, 255, 0.6);
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        /* Контейнер игры */
        #game-container {
            display: none;
            height: 100vh;
        }

        #main-view {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #game-canvas {
            display: block;
            cursor: grab;
        }

        #game-canvas:active {
            cursor: grabbing;
        }

        /* Боковая панель */
        #sidebar {
            width: 350px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-left: 3px solid #4a9eff;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
            overflow-y: auto;
        }

        .panel {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .panel h3 {
            color: #4a9eff;
            margin-bottom: 12px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 2px solid #4a9eff;
            padding-bottom: 8px;
        }

        .resource-bar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .resource {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .resource-icon {
            font-size: 22px;
        }

        .resource-info {
            flex: 1;
        }

        .resource-name {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
        }

        .resource-value {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        .resource-rate {
            font-size: 11px;
            color: #4caf50;
        }

        .resource-rate.negative {
            color: #f44336;
        }

        /* Кнопки действий */
        .action-btn {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: linear-gradient(135deg, #2d5a27, #388e3c);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(45, 90, 39, 0.4);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-btn.gold {
            background: linear-gradient(135deg, #b8860b, #daa520);
        }

        .action-btn.science {
            background: linear-gradient(135deg, #1976d2, #2196f3);
        }

        .action-btn.military {
            background: linear-gradient(135deg, #c62828, #e53935);
        }

        /* Миникарта */
        #minimap-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #4a9eff;
            border-radius: 8px;
            overflow: hidden;
        }

        #minimap {
            display: block;
        }

        /* Информация о выбранном юните */
        #unit-info {
            display: none;
        }

        #unit-info.active {
            display: block;
        }

        .unit-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .stat {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #4a9eff;
        }

        .stat-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }

        /* Прогресс бар */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a9eff, #0066cc);
            transition: width 0.3s;
        }

        /* Уведомления */
        #notifications {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .notification {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #4a9eff;
            border-radius: 8px;
            padding: 12px 24px;
            margin: 5px 0;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Список цивилизаций */
        .civ-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            margin: 5px 0;
        }

        .civ-flag {
            font-size: 24px;
        }

        .civ-info {
            flex: 1;
        }

        .civ-name {
            font-weight: bold;
            font-size: 14px;
        }

        .civ-status {
            font-size: 11px;
            color: #888;
        }

        .civ-status.hostile {
            color: #f44336;
        }

        .civ-status.friendly {
            color: #4caf50;
        }
    </style>
</head>
<body>
    <!-- Главное меню -->
    <div id="main-menu">
        <h1>🏛️ Civilization</h1>
        <p>Real-Time Empire Strategy</p>
        <button class="menu-btn" onclick="startGame()">🎮 Новая игра</button>
        <button class="menu-btn" style="background: linear-gradient(135deg, #666, #888);">⚙️ Настройки</button>
        <button class="menu-btn" style="background: linear-gradient(135deg, #666, #888);">❓ Как играть</button>
    </div>

    <!-- Контейнер игры -->
    <div id="game-container">
        <div id="main-view">
            <canvas id="game-canvas"></canvas>
            <div id="minimap-container">
                <canvas id="minimap" width="200" height="200"></canvas>
            </div>
            <div id="notifications"></div>
        </div>

        <div id="sidebar">
            <div class="panel">
                <h3>📊 Ресурсы</h3>
                <div class="resource-bar">
                    <div class="resource">
                        <span class="resource-icon">🍞</span>
                        <div class="resource-info">
                            <div class="resource-name">Еда</div>
                            <div class="resource-value" id="food">0</div>
                        </div>
                    </div>
                    <div class="resource">
                        <span class="resource-icon">💰</span>
                        <div class="resource-info">
                            <div class="resource-name">Золото</div>
                            <div class="resource-value" id="gold">0</div>
                        </div>
                    </div>
                    <div class="resource">
                        <span class="resource-icon">🔬</span>
                        <div class="resource-info">
                            <div class="resource-name">Наука</div>
                            <div class="resource-value" id="science">0</div>
                        </div>
                    </div>
                    <div class="resource">
                        <span class="resource-icon">🎭</span>
                        <div class="resource-info">
                            <div class="resource-name">Культура</div>
                            <div class="resource-value" id="culture">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h3>🏙️ Города</h3>
                <div id="cities-list"></div>
                <button class="action-btn gold" onclick="foundCity()" id="btn-found-city">
                    🏗️ Основать город (100 💰)
                </button>
            </div>

            <div class="panel">
                <h3>⚔️ Армия</h3>
                <button class="action-btn military" onclick="trainUnit('warrior')" id="btn-train-warrior">
                    ⚔️ Воин (50 💰, 10 🍞)
                </button>
                <button class="action-btn military" onclick="trainUnit('archer')" id="btn-train-archer">
                    🏹 Лучник (80 💰, 15 🍞)
                </button>
                <button class="action-btn military" onclick="trainUnit('cavalry')" id="btn-train-cavalry">
                    🐴 Кавалерия (120 💰, 20 🍞)
                </button>
            </div>

            <div class="panel" id="unit-info">
                <h3>🎖️ Выбранный юнит</h3>
                <div id="unit-name"></div>
                <div class="unit-stats">
                    <div class="stat">
                        <div class="stat-value" id="unit-hp">100</div>
                        <div class="stat-label">HP</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="unit-atk">10</div>
                        <div class="stat-label">Атака</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="unit-def">5</div>
                        <div class="stat-label">Защита</div>
                    </div>
                </div>
                <div style="margin-top: 10px;">
                    <small style="color: #888;">ПКМ - движение/атака</small>
                </div>
            </div>

            <div class="panel">
                <h3>🌍 Цивилизации</h3>
                <div id="civs-list"></div>
            </div>

            <div class="panel">
                <h3>🔬 Технологии</h3>
                <div id="tech-list"></div>
            </div>
        </div>
    </div>

    <script src="scripts/game.js"></script>
</body>
</html>
