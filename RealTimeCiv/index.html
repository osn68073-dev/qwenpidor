<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Civilization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        #game-container {
            display: flex;
            height: 100vh;
        }

        #main-view {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #game-canvas {
            display: block;
            cursor: grab;
        }

        #game-canvas:active {
            cursor: grabbing;
        }

        #sidebar {
            width: 320px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-left: 2px solid #4a9eff;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel h3 {
            color: #4a9eff;
            margin-bottom: 12px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #4a9eff;
            padding-bottom: 8px;
        }

        .resource-bar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .resource {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .resource-icon {
            font-size: 20px;
        }

        .resource-info {
            flex: 1;
        }

        .resource-name {
            font-size: 12px;
            color: #aaa;
        }

        .resource-value {
            font-size: 18px;
            font-weight: bold;
            color: #4a9eff;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4a9eff 0%, #0066cc 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 158, 255, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .unit-list, .city-list, .tech-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .unit-item, .city-item, .tech-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid #4a9eff;
        }

        .unit-name, .city-name, .tech-name {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .unit-stats, .city-stats {
            font-size: 12px;
            color: #aaa;
        }

        .tech-progress {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }

        .tech-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4a9eff, #0066cc);
            transition: width 0.3s ease;
        }

        #minimap-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #4a9eff;
            border-radius: 8px;
            overflow: hidden;
        }

        #minimap {
            display: block;
        }

        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #4a9eff;
            border-radius: 6px;
            padding: 10px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            max-width: 200px;
            display: none;
        }

        .notification {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #4a9eff;
            border-radius: 8px;
            padding: 15px 30px;
            font-weight: bold;
            animation: slideDown 0.5s ease, fadeOut 0.5s ease 2.5s forwards;
            z-index: 1001;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
            }
        }

        .terrain-legend {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            font-size: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="main-view">
            <canvas id="game-canvas"></canvas>
            <div id="minimap-container">
                <canvas id="minimap" width="200" height="200"></canvas>
            </div>
            <div id="tooltip"></div>
        </div>
        
        <div id="sidebar">
            <div class="panel">
                <h3>📊 Ресурсы</h3>
                <div class="resource-bar">
                    <div class="resource">
                        <span class="resource-icon">🍞</span>
                        <div class="resource-info">
                            <div class="resource-name">Еда</div>
                            <div class="resource-value" id="food">0</div>
                        </div>
                    </div>
                    <div class="resource">
                        <span class="resource-icon">💰</span>
                        <div class="resource-info">
                            <div class="resource-name">Золото</div>
                            <div class="resource-value" id="gold">0</div>
                        </div>
                    </div>
                    <div class="resource">
                        <span class="resource-icon">🔬</span>
                        <div class="resource-info">
                            <div class="resource-name">Наука</div>
                            <div class="resource-value" id="science">0</div>
                        </div>
                    </div>
                    <div class="resource">
                        <span class="resource-icon">🎭</span>
                        <div class="resource-info">
                            <div class="resource-name">Культура</div>
                            <div class="resource-value" id="culture">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h3>🏛️ Действия</h3>
                <button class="btn btn-secondary" id="found-city-btn">⚜️ Основать город (100 💰)</button>
                <button class="btn btn-primary" id="train-warrior-btn">⚔️ Обучить воина (50 💰)</button>
                <button class="btn btn-primary" id="train-archer-btn">🏹 Обучить лучника (75 💰)</button>
                <button class="btn btn-primary" id="train-cavalry-btn">🐎 Обучить кавалерию (100 💰)</button>
            </div>

            <div class="panel">
                <h3>🔬 Технологии</h3>
                <div class="tech-list" id="tech-list"></div>
            </div>

            <div class="panel">
                <h3>🏙️ Города</h3>
                <div class="city-list" id="city-list"></div>
            </div>

            <div class="panel">
                <h3>⚔️ Армия</h3>
                <div class="unit-list" id="unit-list"></div>
            </div>

            <div class="panel">
                <h3>🗺️ Местность</h3>
                <div class="terrain-legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: #2d5a27;"></div>
                        <span>Лес</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #8b7355;"></div>
                        <span>Горы</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #d4c685;"></div>
                        <span>Пустыня</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #4a9eff;"></div>
                        <span>Вода</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #7cb342;"></div>
                        <span>Равнина</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #ffd700;"></div>
                        <span>Ресурс</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts/game.js"></script>
</body>
</html>
