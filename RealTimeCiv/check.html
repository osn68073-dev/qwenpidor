<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проверка игры</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #1a1a2e; 
            color: white; 
            padding: 40px; 
            text-align: center;
        }
        .check { 
            padding: 30px; 
            margin: 20px auto; 
            border-radius: 12px; 
            max-width: 600px;
            font-size: 18px;
        }
        .ok { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .error { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .loading { background: linear-gradient(135deg, #3498db, #2980b9); }
        h1 { color: #4a9eff; margin-bottom: 30px; }
        a { color: #4a9eff; font-size: 20px; }
    </style>
</head>
<body>
    <h1>🎮 Real-Time Civilization</h1>
    
    <div id="check" class="check loading">⏳ Проверка файлов...</div>
    
    <div style="margin-top: 40px;">
        <p>Если проверка успешна, откройте:</p>
        <p><a href="index.html" target="_blank">▶️ ЗАПУСТИТЬ ИГРУ (index.html)</a></p>
    </div>
    
    <script>
        const checkDiv = document.getElementById('check');
        
        Promise.all([
            fetch('index.html').then(r => r.ok ? '✅ index.html' : '❌ index.html'),
            fetch('scripts/game.js').then(r => r.ok ? '✅ scripts/game.js' : '❌ scripts/game.js')
        ]).then(results => {
            if (results.every(r => r.startsWith('✅'))) {
                checkDiv.className = 'check ok';
                checkDiv.innerHTML = '<h2>✅ Всё готово!</h2><p>Все файлы загружены корректно.<br>Нажмите на ссылку выше для запуска игры.</p>';
            } else {
                checkDiv.className = 'check error';
                checkDiv.innerHTML = '<h2>❌ Ошибка!</h2><p>' + results.join('<br>') + '</p>';
            }
        }).catch(e => {
            checkDiv.className = 'check error';
            checkDiv.innerHTML = '<h2>❌ Ошибка!</h2><p>' + e.message + '</p>';
        });
    </script>
</body>
</html>
