<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CivWeb MVP - 4X Strategy Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #eee;
    }
    
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    
    #game-canvas {
      display: block;
    }
    
    /* Верхняя панель ресурсов */
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.7) 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      border-bottom: 2px solid #4a4a6a;
    }
    
    .resources {
      display: flex;
      gap: 20px;
    }
    
    .resource {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      min-width: 100px;
    }
    
    .resource-icon {
      font-size: 20px;
    }
    
    .resource-value {
      font-weight: bold;
      font-size: 16px;
    }
    
    .speed-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .speed-btn {
      padding: 8px 16px;
      background: #3a3a5a;
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    
    .speed-btn:hover {
      background: #5a5a8a;
    }
    
    .speed-btn.active {
      background: #4CAF50;
    }
    
    /* Нижняя панель */
    #bottom-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 180px;
      background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.7) 100%);
      z-index: 100;
      border-top: 2px solid #4a4a6a;
      display: flex;
    }
    
    #context-panel {
      flex: 1;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    #minimap-container {
      width: 200px;
      background: rgba(0,0,0,0.5);
      margin: 10px;
      border: 2px solid #4a4a6a;
      border-radius: 4px;
    }
    
    #minimap {
      width: 100%;
      height: 160px;
    }
    
    .panel-title {
      font-size: 14px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .selection-info {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }
    
    .action-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .action-btn {
      padding: 10px 20px;
      background: #4a4a6a;
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      background: #6a6a8a;
    }
    
    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Тултипы */
    .tooltip {
      position: absolute;
      background: rgba(0,0,0,0.9);
      border: 1px solid #6a6a8a;
      border-radius: 4px;
      padding: 10px;
      max-width: 250px;
      font-size: 13px;
      pointer-events: none;
      z-index: 1000;
      display: none;
    }
    
    /* Уведомления */
    #notifications {
      position: absolute;
      top: 80px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 200;
    }
    
    .notification {
      background: rgba(0,0,0,0.8);
      border-left: 4px solid #4CAF50;
      padding: 12px 20px;
      border-radius: 4px;
      animation: slideIn 0.3s ease-out;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    /* Экран загрузки */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    
    #loading-screen.hidden {
      display: none;
    }
    
    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid #3a3a5a;
      border-top-color: #4CAF50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 20px;
      font-size: 18px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loader"></div>
    <div class="loading-text">Загрузка игры...</div>
  </div>
  
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <!-- Верхняя панель -->
    <div id="top-bar">
      <div class="resources">
        <div class="resource" title="Еда">
          <span class="resource-icon">🌾</span>
          <span class="resource-value" id="res-food">0</span>
        </div>
        <div class="resource" title="Производство">
          <span class="resource-icon">⚙️</span>
          <span class="resource-value" id="res-production">0</span>
        </div>
        <div class="resource" title="Золото">
          <span class="resource-icon">💰</span>
          <span class="resource-value" id="res-gold">0</span>
        </div>
        <div class="resource" title="Наука">
          <span class="resource-icon">🔬</span>
          <span class="resource-value" id="res-science">0</span>
        </div>
        <div class="resource" title="Культура">
          <span class="resource-icon">🎭</span>
          <span class="resource-value" id="res-culture">0</span>
        </div>
      </div>
      
      <div class="speed-controls">
        <button class="speed-btn" data-speed="0">⏸️</button>
        <button class="speed-btn active" data-speed="1">1x</button>
        <button class="speed-btn" data-speed="2">2x</button>
        <button class="speed-btn" data-speed="4">4x</button>
        <button class="speed-btn" id="save-btn" title="Сохранить">💾</button>
        <button class="speed-btn" id="load-btn" title="Загрузить">📂</button>
      </div>
    </div>
    
    <!-- Уведомления -->
    <div id="notifications"></div>
    
    <!-- Тултип -->
    <div class="tooltip" id="tooltip"></div>
    
    <!-- Нижняя панель -->
    <div id="bottom-panel">
      <div id="context-panel">
        <div class="panel-title">Выбрано</div>
        <div class="selection-info" id="selection-info">Ничего не выбрано</div>
        <div class="action-buttons" id="action-buttons"></div>
      </div>
      
      <div id="minimap-container">
        <canvas id="minimap"></canvas>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
